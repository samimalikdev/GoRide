name: goride_driver_app
description: "Driver application for GoRide."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  get_it: ^8.0.3
  dartz: ^0.10.1
  google_fonts: ^7.0.0
  http: ^1.1.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_location_marker: ^9.0.0
  geolocator: ^13.0.4
  geocoding: ^2.1.1
  shared_preferences: ^2.2.2
  socket_io_client: ^3.1.4
  qr_flutter: ^4.1.0
  pinput: ^4.0.0
  # Added for document submission
  image_picker: ^1.0.7
  file_picker: ^9.0.0
  flutter_webrtc: ^1.2.1
  permission_handler: ^11.3.1
  firebase_core: ^3.14.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/background/
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
